  <!-- AC text -->
  <text x="50" y="55" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="url(#pinGrad)" text-anchor="middle" dominant-baseline="middle">AC</text>
  <!-- Small house under text -->
